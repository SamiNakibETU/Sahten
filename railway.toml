# Déploiement Sahteïn v4 (Postgres + RAG). Ne pas utiliser Nixpacks sur backend/ :
# cela lançait encore l'ancienne app v2.1 (olj_canonical.json).
[build]
builder = "DOCKERFILE"
dockerfilePath = "v4/Dockerfile.web"

[deploy]
# Démarrage : alembic upgrade head + uvicorn (cf. v4/scripts/docker_entrypoint.sh).
# On force la commande ici plutôt que via le CMD du Dockerfile pour ÉCRASER
# explicitement la "Custom Start Command" qui reste verrouillée dans l'UI Railway
# (sinon elle exécute encore l'ancienne valeur cassée → `executable cd not found`).
startCommand = "/app/scripts/docker_entrypoint.sh"
healthcheckPath = "/healthz"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
