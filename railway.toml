# Déploiement Sahteïn v4 (Postgres + RAG). Ne pas utiliser Nixpacks sur backend/ :
# cela lançait encore l'ancienne app v2.1 (olj_canonical.json).
[build]
builder = "DOCKERFILE"
dockerfilePath = "v4/Dockerfile.web"

[deploy]
# L'image Docker fournit son entrypoint (alembic upgrade + uvicorn).
healthcheckPath = "/healthz"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3









