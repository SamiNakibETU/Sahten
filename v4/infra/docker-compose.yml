version: "3.9"

# Stack locale pour développer Sahteïn v4 sans dépendance Railway.
# Utilise pgvector/pgvector:pg16 (image officielle avec extension installée).
#
# Lancer : docker compose -f v4/infra/docker-compose.yml up -d
# Connexion : postgres://sahten:sahten@localhost:5432/sahten
# Redis     : redis://localhost:6379/0

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sahten_pg
    environment:
      POSTGRES_USER: sahten
      POSTGRES_PASSWORD: sahten
      POSTGRES_DB: sahten
    ports:
      - "5432:5432"
    volumes:
      - sahten_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sahten -d sahten"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: sahten_redis
    ports:
      - "6379:6379"
    volumes:
      - sahten_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  sahten_pgdata:
  sahten_redisdata:
