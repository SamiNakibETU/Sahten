<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sahteïn — Historique des conversations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/css/nav-shell.css" />
  <script
    src="https://cdn.jsdelivr.net/npm/dompurify@3.2.5/dist/purify.min.js"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  ></script>
  <style>
    :root {
      --green: #94c2ae;
      --green-d: #2a6452;
      --line: rgba(0, 0, 0, 0.08);
      --ink: #111;
      --ink-2: #555;
      --ink-3: #999;
      --bg: #fafafa;
      --paper: #fff;
      --ui: "DM Sans", system-ui, sans-serif;
      --serif: "Playfair Display", Georgia, serif;
      --mono: "DM Mono", ui-monospace, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--ui);
      font-size: 14px;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      max-width: 1280px;
      margin: 0 auto;
      min-height: calc(100vh - 44px);
    }
    aside {
      border-right: 1px solid var(--line);
      background: var(--paper);
      padding: 16px;
      overflow-y: auto;
      max-height: calc(100vh - 44px);
      position: sticky; top: 44px;
    }
    aside h2 {
      font-family: var(--serif); font-style: italic;
      font-size: 18px; margin-bottom: 12px;
    }
    aside .session-item {
      display: block; padding: 10px 12px;
      border: 1px solid var(--line); border-radius: 8px;
      margin-bottom: 6px; cursor: pointer;
      background: var(--paper); transition: all 0.1s;
    }
    aside .session-item:hover { border-color: var(--green); background: rgba(148,194,174,0.06); }
    aside .session-item.active {
      border-color: var(--green-d);
      background: rgba(148,194,174,0.12);
    }
    .session-item .sid {
      font-family: var(--mono); font-size: 11px;
      color: var(--ink-2); margin-bottom: 2px;
    }
    .session-item .meta {
      font-size: 11px; color: var(--ink-3);
    }
    .empty { color: var(--ink-3); font-size: 13px; padding: 12px 0; }

    main {
      padding: 24px 32px 80px;
      overflow-y: auto;
    }
    main header {
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }
    main header h1 {
      font-family: var(--serif); font-style: italic;
      font-size: 22px;
    }
    main header .sid {
      font-family: var(--mono); font-size: 12px;
      color: var(--ink-2); margin-top: 4px;
    }
    .msg {
      margin: 12px 0; padding: 14px 16px;
      border-radius: 12px; max-width: 720px;
    }
    .msg.user {
      background: var(--ink); color: #fff;
      margin-left: auto; border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      background: var(--paper);
      border: 1px solid var(--line);
      border-bottom-left-radius: 4px;
    }
    .msg .role {
      font-size: 10.5px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      opacity: 0.7; margin-bottom: 6px;
    }
    .msg .meta {
      font-family: var(--mono); font-size: 10.5px;
      color: var(--ink-3); margin-top: 8px;
    }
    .msg.assistant .sahten-narrative h2,
    .msg.assistant .sahten-narrative h3 {
      font-family: var(--serif); margin: 8px 0 6px;
    }
    .msg.assistant .sahten-narrative p { margin: 6px 0; line-height: 1.55; }
    .msg.assistant .sahten-narrative ul,
    .msg.assistant .sahten-narrative ol { margin: 6px 0 6px 20px; }
    .msg.assistant .sahten-sources ul { margin-top: 4px; }
    .msg.assistant .sahten-sources a { color: var(--green-d); }
    .placeholder {
      color: var(--ink-3); font-style: italic;
      padding: 40px 0; text-align: center;
    }
    .badge {
      display: inline-block; padding: 2px 8px;
      border-radius: 999px; font-size: 11px;
      background: rgba(148,194,174,0.18); color: var(--green-d);
      margin-right: 6px;
    }
    .history-side-refresh {
      width: 100%;
      box-sizing: border-box;
      margin-top: 4px;
      justify-content: center;
    }
  </style>
</head>
<body>
  <nav class="top" aria-label="Navigation">
    <a class="nav-brand" href="/">
      <img src="assets/v7_logo_sahten.svg" alt="" width="18" height="18" decoding="async" />
      <span>Sahteïn</span>
    </a>
    <div class="nav-sep" aria-hidden="true"></div>
    <a class="nav-olj" href="https://www.lorientlejour.com/cuisine-liban-a-table" target="_blank" rel="noopener" title="L'Orient-Le Jour">
      <img src="assets/logo_olj.svg?v=3" alt="L'Orient-Le Jour" />
    </a>
    <div class="nav-space"></div>
    <div class="nav-links">
      <a class="nav-link" href="/">Démo</a>
      <a class="nav-link" href="/widget">Sahteïn</a>
      <a class="nav-link" href="/admin">Admin</a>
      <a class="nav-link on" href="/history">Historique</a>
      <a class="nav-link" href="/dashboard">Analytics</a>
    </div>
    <div class="nav-sep nav-sep--compact" aria-hidden="true"></div>
    <a class="nav-aux" href="/readyz" target="_blank" rel="noopener">Santé</a>
    <a class="nav-aux" href="/docs" target="_blank" rel="noopener">API</a>
    <button type="button" class="nav-act" onclick="location.reload()" title="Recharger la page" aria-label="Recharger la page">
      <svg class="nav-act-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M8 16H3v5"/>
      </svg>
      <span>Actualiser</span>
    </button>
    <a class="nav-atable" href="/?dev=1">Mode Dev</a>
  </nav>

  <div class="layout">
    <aside>
      <h2>Sessions</h2>
      <button type="button" class="nav-act history-side-refresh" id="refresh-btn" title="Rafraîchir la liste">
        <svg class="nav-act-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
        <span>Rafraîchir</span>
      </button>
      <div id="sessions-list" style="margin-top:12px"></div>
    </aside>

    <main>
      <header>
        <h1 id="title">Historique des conversations</h1>
        <div class="sid" id="sid-display">— Sélectionnez une session à gauche —</div>
      </header>
      <div id="messages"><div class="placeholder">Aucune session sélectionnée.</div></div>
    </main>
  </div>

  <script src="/js/admin-api.js"></script>
  <script>
    const ALLOWED_TAGS = ['div','p','span','strong','em','u','br','a','article','section','h2','h3','header','ul','li','ol','blockquote'];
    const ALLOWED_ATTR = ['id','class','href','target','style','rel','aria-label','role'];

    function sanitize(html) {
      if (typeof DOMPurify === 'undefined') return html;
      return DOMPurify.sanitize(html, { ALLOWED_TAGS, ALLOWED_ATTR, ALLOW_DATA_ATTR: false });
    }

    function fmtTime(ts) {
      try {
        const d = new Date(ts * 1000);
        return d.toLocaleString('fr-FR', { dateStyle: 'short', timeStyle: 'short' });
      } catch { return ''; }
    }

    async function loadSessions() {
      const list = document.getElementById('sessions-list');
      list.innerHTML = '<div class="empty">Chargement…</div>';
      try {
        const r = await sahtenAdmin.fetch('/api/sessions?limit=100');
        const data = await r.json();
        if (!data.items || !data.items.length) {
          list.innerHTML = '<div class="empty">Aucune session enregistrée pour le moment.</div>';
          return;
        }
        list.innerHTML = '';
        data.items.forEach(it => {
          const div = document.createElement('div');
          div.className = 'session-item';
          div.dataset.sid = it.session_id;
          div.innerHTML = `
            <div class="sid">${it.session_id}</div>
            <div class="meta">${it.n_messages} message(s) · ${fmtTime(it.last_seen)}</div>
          `;
          div.addEventListener('click', () => openSession(it.session_id));
          list.appendChild(div);
        });
        const url = new URL(window.location.href);
        const presel = url.searchParams.get('session');
        if (presel) openSession(presel);
      } catch (e) {
        list.innerHTML = `<div class="empty">Erreur: ${e.message}</div>`;
      }
    }

    async function openSession(sid) {
      document.querySelectorAll('.session-item').forEach(el => {
        el.classList.toggle('active', el.dataset.sid === sid);
      });
      document.getElementById('sid-display').textContent = sid;
      const url = new URL(window.location.href);
      url.searchParams.set('session', sid);
      window.history.replaceState(null, '', url.toString());

      const messages = document.getElementById('messages');
      messages.innerHTML = '<div class="placeholder">Chargement…</div>';
      try {
        const r = await sahtenAdmin.fetch(`/api/sessions/${encodeURIComponent(sid)}`);
        const data = await r.json();
        if (!data.messages || !data.messages.length) {
          messages.innerHTML = '<div class="placeholder">Session vide.</div>';
          return;
        }
        messages.innerHTML = '';
        data.messages.forEach(m => {
          const div = document.createElement('div');
          div.className = 'msg ' + (m.role === 'user' ? 'user' : 'assistant');
          if (m.role === 'user') {
            const safeText = (m.text || '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
            div.innerHTML = `<div class="role">Vous</div><div>${safeText}</div><div class="meta">${fmtTime(m.ts)}</div>`;
          } else {
            const tags = [];
            if (m.intent) tags.push(`<span class="badge">${m.intent}</span>`);
            if (typeof m.confidence === 'number') tags.push(`<span class="badge">conf ${(m.confidence*100).toFixed(0)}%</span>`);
            if (m.model_used) tags.push(`<span class="badge">${m.model_used}</span>`);
            div.innerHTML = `
              <div class="role">Sahteïn</div>
              ${sanitize(m.html || '')}
              <div class="meta">${tags.join(' ')} · ${fmtTime(m.ts)} · req=${m.request_id || '—'}</div>
            `;
          }
          messages.appendChild(div);
        });
      } catch (e) {
        messages.innerHTML = `<div class="placeholder">Erreur: ${e.message}</div>`;
      }
    }

    document.getElementById('refresh-btn').addEventListener('click', loadSessions);
    loadSessions();
  </script>
</body>
</html>
