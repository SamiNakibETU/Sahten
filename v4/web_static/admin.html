<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sahteïn — Admin Base RAG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/css/nav-shell.css" />
  <style>
    :root {
      --green: #94c2ae;
      --green-d: #2a6452;
      --line: rgba(0, 0, 0, 0.08);
      --ink: #111;
      --ink-2: #555;
      --ink-3: #999;
      --bg: #fafafa;
      --paper: #fff;
      --ui: "DM Sans", system-ui, sans-serif;
      --serif: "Playfair Display", Georgia, serif;
      --mono: "DM Mono", ui-monospace, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--ui); font-size: 14px; background: var(--bg); color: var(--ink); }

    .page { max-width: 1280px; margin: 0 auto; padding: 24px 32px 80px; }
    h1 { font-family: var(--serif); font-style: italic; font-size: 26px; margin-bottom: 16px; }

    .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat {
      background: var(--paper); border: 1px solid var(--line);
      border-radius: 10px; padding: 14px;
    }
    .stat .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-3); }
    .stat .value { font-family: var(--serif); font-size: 28px; margin-top: 4px; }
    .stat .sub { font-size: 11px; color: var(--ink-2); margin-top: 2px; }

    .controls { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
    input[type="search"], input[type="number"] {
      font-family: var(--ui); font-size: 13px;
      padding: 7px 10px; border: 1px solid var(--line); border-radius: 6px;
      background: var(--paper); color: var(--ink);
    }
    input[type="search"] { min-width: 280px; }
    button {
      background: var(--ink); color: #fff; border: none;
      padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
    }
    button.ghost { background: transparent; color: var(--ink-2); border: 1px solid var(--line); }
    button:hover { opacity: 0.85; }

    table { width: 100%; border-collapse: collapse; background: var(--paper); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
    th, td { padding: 10px 12px; text-align: left; font-size: 13px; border-bottom: 1px solid var(--line); }
    th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-3); background: rgba(0,0,0,0.02); }
    tr:last-child td { border-bottom: none; }
    tr.clickable { cursor: pointer; }
    tr.clickable:hover { background: rgba(148,194,174,0.06); }
    .ext { font-family: var(--mono); font-size: 11px; color: var(--ink-2); }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px;
      background: rgba(148,194,174,0.18); color: var(--green-d);
    }
    .badge.warn { background: rgba(255,180,80,0.2); color: #b35900; }
    .pager { display: flex; gap: 8px; align-items: center; margin-top: 12px; font-size: 12px; color: var(--ink-2); }

    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: none; align-items: center; justify-content: center; z-index: 50;
    }
    .modal.open { display: flex; }
    .modal-card {
      background: var(--paper); border-radius: 12px; max-width: 900px; width: 92%;
      max-height: 86vh; overflow-y: auto; padding: 24px;
    }
    .modal-card h2 { font-family: var(--serif); font-size: 22px; margin-bottom: 8px; }
    .modal-card .meta { font-size: 12px; color: var(--ink-2); margin-bottom: 16px; }
    .modal-card .chunks { margin-top: 16px; }
    .chunk {
      border: 1px solid var(--line); border-radius: 8px;
      padding: 10px 12px; margin-bottom: 8px; background: var(--bg);
    }
    .chunk header { display: flex; flex-wrap: wrap; gap: 6px 10px; align-items: center; font-size: 11px; color: var(--ink-2); margin-bottom: 6px; font-family: var(--mono); }
    .chunk pre { white-space: pre-wrap; font-family: var(--ui); font-size: 12.5px; color: var(--ink); }
    .kind-badge {
      display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.04em; font-family: var(--mono);
    }
    .kind-badge.recipe_meta { background: rgba(90,120,180,0.15); color: #345; }
    .kind-badge.recipe_summary { background: rgba(120,90,160,0.12); color: #423; }
    .kind-badge.ingredients_list { background: rgba(40,140,100,0.15); color: #163; }
    .kind-badge.recipe_steps { background: rgba(180,120,40,0.15); color: #630; }
    .kind-badge.recipe_history { background: rgba(100,100,180,0.14); color: #224; }
    .kind-badge.chef_astuce { background: rgba(200,140,60,0.15); color: #640; }
    .kind-badge.chef_bio { background: rgba(60,130,130,0.15); color: #044; }
    .kind-badge.intro { background: rgba(120,120,120,0.12); color: #444; }
    .kind-badge.default { background: rgba(0,0,0,0.06); color: var(--ink-2); }
    .embed-pill { font-size: 10px; padding: 2px 7px; border-radius: 999px; font-weight: 600; }
    .embed-pill.yes { background: rgba(40,160,90,0.2); color: #0a5; }
    .embed-pill.no { background: rgba(200,60,60,0.12); color: #a30; }
    .sections-grid { display: grid; gap: 8px; margin: 12px 0 20px; }
    .section-card {
      border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; background: rgba(148,194,174,0.04);
    }
    .section-card header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .section-card .ph { font-size: 11px; color: var(--ink-3); }
    .section-card pre { font-size: 12px; color: var(--ink-2); white-space: pre-wrap; margin: 0; line-height: 1.4; }
    .close-btn { float: right; background: transparent; color: var(--ink-2); border: 1px solid var(--line); }
    .article-recap { white-space: pre-wrap; line-height: 1.45; font-size: 13px; }
    .body-preview {
      display: block; max-height: 38vh; overflow: auto; margin: 0;
      padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px;
      background: var(--bg); font-family: var(--ui); font-size: 12.5px;
      line-height: 1.45; white-space: pre-wrap; word-break: break-word;
    }
  </style>
</head>
<body>
  <nav class="top" aria-label="Navigation">
    <a class="nav-brand" href="/">
      <img src="assets/v7_logo_sahten.svg" alt="" width="18" height="18" decoding="async" />
      <span>Sahteïn</span>
    </a>
    <div class="nav-sep" aria-hidden="true"></div>
    <a class="nav-olj" href="https://www.lorientlejour.com/cuisine-liban-a-table" target="_blank" rel="noopener" title="L'Orient-Le Jour">
      <img src="assets/logo_olj.svg?v=3" alt="L'Orient-Le Jour" />
    </a>
    <div class="nav-space"></div>
    <div class="nav-links">
      <a class="nav-link" href="/">Démo</a>
      <a class="nav-link" href="/widget">Sahteïn</a>
      <a class="nav-link on" href="/admin">Admin</a>
      <a class="nav-link" href="/history">Historique</a>
      <a class="nav-link" href="/dashboard">Analytics</a>
    </div>
    <div class="nav-sep nav-sep--compact" aria-hidden="true"></div>
    <a class="nav-aux" href="/api/health/deep" target="_blank" rel="noopener">Santé</a>
    <a class="nav-aux" href="/docs" target="_blank" rel="noopener">API</a>
    <button type="button" class="nav-act" onclick="location.reload()" title="Recharger la page" aria-label="Recharger la page">
      <svg class="nav-act-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M8 16H3v5"/>
      </svg>
      <span>Actualiser</span>
    </button>
    <a class="nav-atable" href="/?dev=1">Mode Dev</a>
  </nav>

  <div class="page">
    <h1>Base de connaissance Sahteïn</h1>

    <section class="stats" id="stats">
      <div class="stat"><div class="label">Articles</div><div class="value" id="s-articles">…</div><div class="sub" id="s-status-breakdown"></div></div>
      <div class="stat"><div class="label">Chunks</div><div class="value" id="s-chunks">…</div><div class="sub" id="s-embedded"></div></div>
      <div class="stat"><div class="label">Personnes</div><div class="value" id="s-persons">…</div></div>
      <div class="stat"><div class="label">Catégories</div><div class="value" id="s-cats">…</div></div>
      <div class="stat"><div class="label">Mots-clés</div><div class="value" id="s-kw">…</div></div>
    </section>

    <div class="controls">
      <input type="search" id="search" placeholder="Rechercher un titre d'article…" />
      <button id="search-btn">Filtrer</button>
      <button class="ghost" id="reset-btn">Réinitialiser</button>
      <span class="spacer" style="flex:1"></span>
      <span style="font-size:12px;color:var(--ink-2)" id="totals"></span>
    </div>

    <table id="articles-table">
      <thead>
        <tr>
          <th>ID</th><th>Titre</th><th>Statut</th><th>Publié le</th><th>URL</th>
        </tr>
      </thead>
      <tbody id="rows"><tr><td colspan="5" style="text-align:center;color:var(--ink-3);padding:24px">Chargement…</td></tr></tbody>
    </table>

    <div class="pager">
      <button id="prev-btn" class="ghost">← Précédent</button>
      <span id="page-info">page 1</span>
      <button id="next-btn" class="ghost">Suivant →</button>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-card">
      <button class="close-btn" id="close-modal">Fermer ✕</button>
      <h2 id="m-title">…</h2>
      <div class="meta" id="m-meta"></div>
      <div id="m-summary"></div>
      <div class="chunks" id="m-chunks"></div>
    </div>
  </div>

  <script>
    const state = { limit: 25, offset: 0, search: '' };

    function escapeHtml(s) { return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function fmtDate(s) { if (!s) return '—'; try { return new Date(s).toLocaleDateString('fr-FR'); } catch { return s; } }
    function kindBadgeClass(kind) {
      const k = (kind || 'default').replace(/[^a-z0-9_]/gi, '');
      const known = ['recipe_meta','recipe_summary','ingredients_list','recipe_steps','recipe_history','chef_astuce','chef_bio','intro','list','paragraph'];
      return known.includes(k) ? k : 'default';
    }

    async function loadStats() {
      try {
        const r = await fetch('/api/admin/stats');
        const data = await r.json();
        const c = data.counts || {};
        document.getElementById('s-articles').textContent = (c.articles ?? 0).toLocaleString('fr-FR');
        const bySt = c.articles_by_status || {};
        const stParts = Object.keys(bySt).sort().map(k => `${k}: ${bySt[k]}`);
        document.getElementById('s-status-breakdown').textContent = stParts.length
          ? 'Statut ingestion — ' + stParts.join(' · ')
          : '';
        document.getElementById('s-chunks').textContent = (c.chunks ?? 0).toLocaleString('fr-FR');
        document.getElementById('s-embedded').textContent = `${(c.chunks_embedded ?? 0).toLocaleString('fr-FR')} avec embedding`;
        document.getElementById('s-persons').textContent = (c.persons ?? 0).toLocaleString('fr-FR');
        document.getElementById('s-cats').textContent = (c.categories ?? 0).toLocaleString('fr-FR');
        document.getElementById('s-kw').textContent = (c.keywords ?? 0).toLocaleString('fr-FR');
      } catch (e) {
        console.error(e);
      }
    }

    async function loadArticles() {
      const tbody = document.getElementById('rows');
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--ink-3);padding:24px">Chargement…</td></tr>';
      const url = new URL('/api/admin/articles', window.location.origin);
      url.searchParams.set('limit', state.limit);
      url.searchParams.set('offset', state.offset);
      if (state.search) url.searchParams.set('search', state.search);
      try {
        const r = await fetch(url);
        const data = await r.json();
        document.getElementById('totals').textContent = `${data.total.toLocaleString('fr-FR')} article(s)`;
        const items = data.items || [];
        if (!items.length) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--ink-3);padding:24px">Aucun résultat. Lancez d’abord un backfill (cf. railway-runbook.md).</td></tr>';
        } else {
          tbody.innerHTML = '';
          items.forEach(a => {
            const tr = document.createElement('tr');
            tr.className = 'clickable';
            const status = a.ingestion_status === 'ok'
              ? '<span class="badge" title="Complet : corps assez riche + auteur">ok</span>'
              : `<span class="badge warn" title="Partiel ou à compléter">${escapeHtml(a.ingestion_status||'?')}</span>`;
            tr.innerHTML = `
              <td><span class="ext">${a.external_id}</span></td>
              <td><strong>${escapeHtml(a.title)}</strong></td>
              <td>${status}</td>
              <td>${fmtDate(a.first_published_at)}</td>
              <td><a href="${escapeHtml(a.url)}" target="_blank" rel="noopener">↗ OLJ</a></td>
            `;
            tr.addEventListener('click', (ev) => {
              if (ev.target.tagName === 'A') return;
              openArticle(a.id);
            });
            tbody.appendChild(tr);
          });
        }
        const page = Math.floor(state.offset / state.limit) + 1;
        const totalPages = Math.max(1, Math.ceil(data.total / state.limit));
        document.getElementById('page-info').textContent = `page ${page} / ${totalPages}`;
        document.getElementById('prev-btn').disabled = state.offset === 0;
        document.getElementById('next-btn').disabled = state.offset + state.limit >= data.total;
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#b00;padding:24px">Erreur : ${e.message}</td></tr>`;
      }
    }

    async function openArticle(id) {
      const modal = document.getElementById('modal');
      const title = document.getElementById('m-title');
      const meta = document.getElementById('m-meta');
      const summary = document.getElementById('m-summary');
      const chunks = document.getElementById('m-chunks');
      title.textContent = 'Chargement…'; meta.textContent = ''; summary.innerHTML = ''; chunks.innerHTML = '';
      modal.classList.add('open');
      try {
        const r = await fetch(`/api/admin/articles/${id}`);
        const a = await r.json();
        title.textContent = a.title;
        meta.innerHTML = `
          <span class="ext">ext_id ${a.external_id}</span> ·
          ${fmtDate(a.first_published_at)} ·
          <a href="${escapeHtml(a.url)}" target="_blank" rel="noopener">${escapeHtml(a.url)}</a> ·
          ${a.is_premium ? '<span class="badge warn">premium</span>' : '<span class="badge">free</span>'} ·
          ${a.n_sections ?? 0} section(s) · ${a.n_chunks} chunk(s)
        `;
        if (a.subtitle) summary.innerHTML += `<p style="font-style:italic;color:var(--ink-2)">${escapeHtml(a.subtitle)}</p>`;
        const recap = (a.summary_plain && a.summary_plain.trim()) ? a.summary_plain : (a.summary || '');
        if (recap) summary.innerHTML += `<p class="article-recap">${escapeHtml(recap)}</p>`;
        if (a.body_text_preview) {
          const full = a.body_text_preview.length >= 24000;
          summary.innerHTML += `<h3 style="font-size:14px;margin:12px 0 6px">Texte indexé (corps)</h3><pre class="body-preview">${escapeHtml(a.body_text_preview)}${full ? '…' : ''}</pre>`;
        }
        if (a.ingestion_notes) summary.innerHTML += `<p style="color:#b35900;font-size:12px">⚠ ${escapeHtml(a.ingestion_notes)}</p>`;
        let below = '';
        const secList = a.sections || [];
        if (secList.length) {
          below += `<h3 style="font-family:var(--serif);font-size:16px;margin:16px 0 8px">Sections détectées (${secList.length})</h3>`;
          below += `<div class="sections-grid" role="list">`;
          secList.forEach(s => {
            const kb = kindBadgeClass(s.kind);
            below += `<div class="section-card" role="listitem"><header>
              <span class="kind-badge ${kb}">${escapeHtml(s.kind)}</span>
              <span class="ph">#${s.position}${s.heading ? ' · ' + escapeHtml(s.heading) : ''}</span>
            </header><pre>${escapeHtml(s.text_preview || '')}</pre></div>`;
          });
          below += `</div>`;
        }
        below += '<h3 style="font-family:var(--serif);font-size:16px;margin:8px 0">Chunks indexés (RAG)</h3>';
        chunks.innerHTML = below;
        (a.chunks || []).forEach(c => {
          const div = document.createElement('div');
          div.className = 'chunk';
          const kb = kindBadgeClass(c.kind);
          const sk = c.section_kind ? kindBadgeClass(c.section_kind) : 'default';
          const secLine = c.section_id
            ? `<span class="kind-badge ${sk}" title="Section source">↳ ${escapeHtml(c.section_kind || '')}</span>`
            : '';
          const emb = c.has_embedding
            ? '<span class="embed-pill yes">vecteur</span>'
            : '<span class="embed-pill no">sans embedding</span>';
          div.innerHTML = `
            <header>
              <span class="kind-badge ${kb}">${escapeHtml(c.kind)}</span>
              ${secLine}
              <span>#${c.position}</span>
              <span>id ${c.id}</span>
              <span>${c.token_count != null ? c.token_count + ' tok' : '—'}</span>
              ${emb}
              <span>${escapeHtml(c.embedding_model || '—')}</span>
            </header>
            <pre>${escapeHtml(c.text_preview)}${c.text_preview && c.text_preview.length === 300 ? '…' : ''}</pre>
          `;
          chunks.appendChild(div);
        });
      } catch (e) {
        title.textContent = 'Erreur'; meta.textContent = e.message;
      }
    }

    document.getElementById('search-btn').addEventListener('click', () => {
      state.search = document.getElementById('search').value.trim();
      state.offset = 0;
      loadArticles();
    });
    document.getElementById('search').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('search-btn').click();
    });
    document.getElementById('reset-btn').addEventListener('click', () => {
      state.search = ''; state.offset = 0;
      document.getElementById('search').value = '';
      loadArticles();
    });
    document.getElementById('prev-btn').addEventListener('click', () => {
      state.offset = Math.max(0, state.offset - state.limit); loadArticles();
    });
    document.getElementById('next-btn').addEventListener('click', () => {
      state.offset += state.limit; loadArticles();
    });
    document.getElementById('close-modal').addEventListener('click', () => {
      document.getElementById('modal').classList.remove('open');
    });
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') document.getElementById('modal').classList.remove('open');
    });

    loadStats();
    loadArticles();
  </script>
</body>
</html>
