<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Orient-Le Jour - Sahteïn</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/aktiv-grotesk-cd-trial" crossorigin="anonymous" />

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.3.3/purify.min.js"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
      onerror="this.onerror=null; this.src='https://unpkg.com/dompurify@3.3.3/dist/purify.min.js'"
    ></script>

    <link rel="stylesheet" href="css/sahten.css" />

    <style>
      body {
        background-color: #ffffff;
        font-family: "DM Sans", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        color: #999;
      }
      .page-context {
        text-align: center;
      }
      h1 {
        font-weight: 600;
        color: #111;
        letter-spacing: -0.03em;
        margin-bottom: 8px;
      }
      .mode-switcher {
        position: fixed;
        top: 16px;
        left: 16px;
        display: flex;
        gap: 8px;
        z-index: 1000;
      }
      .mode-btn {
        padding: 8px 14px;
        border: 1px solid #ddd;
        border-radius: 6px;
        background: white;
        font-size: 12px;
        font-family: inherit;
        cursor: pointer;
        text-decoration: none;
        color: #666;
        transition: all 0.2s;
      }
      .mode-btn:hover {
        border-color: #94c2ae;
        color: #333;
      }
      .mode-btn.active {
        background: #94c2ae;
        border-color: #94c2ae;
        color: white;
      }
    </style>
  </head>
  <body>
    <nav class="mode-switcher">
      <a href="/" class="mode-btn">Démo</a>
      <a href="/embed" class="mode-btn active">Widget</a>
      <a href="/dashboard" class="mode-btn">Analytics</a>
    </nav>

    <div class="page-context">
      <h1>L'Orient-Le Jour</h1>
      <p>Widget Sahteïn - Production</p>
    </div>

    <div class="sahten-backdrop"></div>
    <div class="sahten-widget-container" data-size="window">
      <div class="sahten-drag-handle"></div>

      <div class="sahten-header">
        <div class="sahten-brand">
          <img class="sahten-logo-mascot" src="assets/v7_logo_sahten.svg" alt="Sahteïn" width="40" height="40" decoding="async" />
          <span class="sahten-title sahten-title--brand">Sahteïn</span>
        </div>
        <div class="sahten-controls">
          <button class="sahten-size-btn" data-action="window" aria-label="Petit">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4.5" y="3.5" width="7" height="9" rx="1.5" /></svg>
          </button>
          <button class="sahten-size-btn" data-action="mid" aria-label="Moyen">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2.5" y="2.5" width="11" height="11" rx="1.5" /></svg>
          </button>
          <button class="sahten-size-btn" data-action="full" aria-label="Grand">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="10 2 14 2 14 6" /><polyline points="6 14 2 14 2 10" /><line x1="14" y1="2" x2="9.5" y2="6.5" /><line x1="2" y1="14" x2="6.5" y2="9.5" /></svg>
          </button>
          <button class="sahten-close-btn" aria-label="Fermer">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="3.5" y1="3.5" x2="12.5" y2="12.5" /><line x1="12.5" y1="3.5" x2="3.5" y2="12.5" /></svg>
          </button>
        </div>
      </div>

      <div class="sahten-body"></div>

      <form id="sahten-form" class="sahten-footer">
        <div class="input-wrapper">
          <textarea
            id="sahten-input"
            class="sahten-input"
            placeholder="Un plat, un ingrédient, un chef…"
            autocomplete="off"
            rows="1"
          ></textarea>
          <button type="submit" class="send-btn" aria-label="Envoyer">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="8" x2="13" y2="8" /><polyline points="9 4 13 8 9 12" />
            </svg>
          </button>
        </div>
      </form>
    </div>

    <script>
      window.SAHTEN_API_BASE = window.location.origin + "/api";
    </script>

    <script type="module">
      import { SahtenChat } from "./js/sahten.js";
      /* Production : pas de sélecteur de modèle (réglage côté API / dev uniquement) */
      new SahtenChat();
    </script>

    <button
      type="button"
      class="sahten-trigger"
      aria-label="Ouvrir Sahteïn — assistant recettes L'Orient-Le Jour"
      title="Une idée recette ? Cliquez pour ouvrir Sahteïn."
      aria-expanded="false"
    >
      <img class="sahten-trigger-logo" src="assets/v7_logo_sahten.svg" alt="" width="52" height="52" decoding="async" />
    </button>
  </body>
</html>
