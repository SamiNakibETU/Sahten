<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sahten — L'Orient-Le Jour</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/aktiv-grotesk-cd-trial" crossorigin="anonymous" />

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
      onerror="this.onerror=null;this.src='https://unpkg.com/dompurify@3.0.8/dist/purify.min.js'"
    ></script>

    <link rel="stylesheet" href="css/sahten.css" />

    <style>
      body {
        margin: 0;
        background: #f0ede8;
        font-family: "DM Sans", -apple-system, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        color: #888;
      }
      .page-bg {
        text-align: center;
        user-select: none;
      }
      .page-bg h1 {
        font-family: "Playfair Display", Georgia, serif;
        font-size: 22px;
        font-weight: 600;
        color: #bbb;
        letter-spacing: -0.01em;
        margin-bottom: 6px;
      }
      .page-bg p {
        font-size: 13px;
        color: #ccc;
      }
    </style>
  </head>
  <body>
    <div class="page-bg">
      <h1>L'Orient-Le Jour</h1>
      <p>Sahten — assistant recettes</p>
    </div>

    <div class="sahten-backdrop"></div>

    <div class="sahten-widget-container" data-size="window">
      <div class="sahten-drag-handle"></div>

      <div class="sahten-header">
        <div class="sahten-brand">
          <img class="sahten-logo-mascot" src="assets/sahten_logo_v2.svg" alt="Sahten" />
          <span class="sahten-title sahten-title--brand">Sahten</span>
        </div>

        <div class="sahten-controls">
          <select id="model-select" class="sahten-model-select" title="Modèle LLM">
            <option value="auto">Auto</option>
            <option value="gpt-4.1-nano">Nano</option>
            <option value="gpt-4.1-mini">Mini</option>
          </select>

          <button class="sahten-size-btn" data-action="window" aria-label="Fenêtre">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4.5" y="3.5" width="7" height="9" rx="1.5" /></svg>
          </button>
          <button class="sahten-size-btn" data-action="mid" aria-label="Centré">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2.5" y="2.5" width="11" height="11" rx="1.5" /></svg>
          </button>
          <button class="sahten-size-btn" data-action="full" aria-label="Plein écran">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="10 2 14 2 14 6" /><polyline points="6 14 2 14 2 10" /><line x1="14" y1="2" x2="9.5" y2="6.5" /><line x1="2" y1="14" x2="6.5" y2="9.5" /></svg>
          </button>
          <button class="sahten-close-btn" aria-label="Fermer">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="4" y1="4" x2="12" y2="12" /><line x1="12" y1="4" x2="4" y2="12" /></svg>
          </button>
        </div>
      </div>

      <div class="sahten-cuisine-strip">
        <img
          class="sahten-cuisine-strip-img"
          src="assets/header_cooking_img_desktop.png"
          width="1040"
          height="51"
          alt="À table ! Rubrique cuisine Le Liban à table"
          decoding="async"
          fetchpriority="low"
        />
      </div>

      <div class="sahten-body"></div>

      <form id="sahten-form" class="sahten-footer">
        <div class="input-wrapper">
          <textarea
            id="sahten-input"
            class="sahten-input"
            placeholder="Je cherche une recette..."
            autocomplete="off"
            rows="1"
          ></textarea>
          <button type="submit" class="send-btn" aria-label="Envoyer">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="8" x2="13" y2="8" /><polyline points="9 4 13 8 9 12" />
            </svg>
          </button>
        </div>
      </form>
    </div>

    <button class="sahten-trigger" aria-label="Ouvrir Sahten">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
      </svg>
    </button>

    <script>
      window.SAHTEN_API_BASE = window.location.origin + "/api";
    </script>

    <script type="module">
      import { SahtenChat } from "./js/sahten.js";
      new SahtenChat({
        modelSelector: document.getElementById("model-select"),
      });
    </script>
  </body>
</html>
