# Jeu golden pour évaluation RAG Sahten (Phase 0 du plan SOTA).
# expected_url_substring: fragment d’URL OLJ attendu dans le top résultat (optionnel).
# expected_intent: intent QueryAnalysis attendu (optionnel, contrôle best-effort).
# expected_task / expected_course / expected_cuisine_scope: champs QueryPlan (optionnels, si debug expose plan).
# tags: libre (hiver, mood, plat_nommé, vague, etc.)

queries:
  - id: taboule_explicit
    text: "recette de taboulé"
    expected_url_substring: "1227694"
    expected_intent: recipe_specific
    tags: [plat_nommé]

  - id: hiver_mood
    text: "recette pour l'hiver"
    expected_intent: recipe_by_mood
    tags: [saison, mood]

  - id: houmous
